<div
  class="animate-in fade-in zoom-in duration-700 max-w-lg mx-auto backdrop-blur-2xl bg-gray-900/40 p-10 rounded-3xl border border-purple-500/20 shadow-[0_0_50px_-12px_rgba(139,92,246,0.3)]"
>
  <h2
    class="text-3xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-gray-200"
  >
    Cadastro de Aluno
  </h2>

  <form [formGroup]="cadastroForm" (ngSubmit)="finalizarCadastro()" class="space-y-4">
    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >Nome Completo</label
      >
      <input
        formControlName="nome"
        type="text"
        placeholder="João Silva"
        [class.border-red-500]="
          cadastroForm.get('nome')?.invalid && cadastroForm.get('nome')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
      <p
        *ngIf="cadastroForm.get('nome')?.invalid && cadastroForm.get('nome')?.touched"
        class="text-red-400 text-xs mt-1"
      >
        Nome é obrigatório (mín. 3 caracteres).
      </p>
    </div>

    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >Nome de Usuário</label
      >
      <input
        formControlName="usuario"
        type="text"
        placeholder="Ex: joao.silva"
        [class.border-red-500]="
          cadastroForm.get('usuario')?.invalid && cadastroForm.get('usuario')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
    </div>

    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >CPF</label
      >
      <input
        formControlName="cpf"
        type="text"
        placeholder="000.000.000-00"
        [class.border-red-500]="
          cadastroForm.get('cpf')?.invalid && cadastroForm.get('cpf')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
    </div>

    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >Endereço</label
      >
      <input
        formControlName="endereco"
        type="text"
        placeholder="Rua Exemplo, 123"
        [class.border-red-500]="
          cadastroForm.get('endereco')?.invalid && cadastroForm.get('endereco')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
    </div>

    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >Telefone</label
      >
      <input
        formControlName="telefone"
        type="tel"
        placeholder="(00) 00000-0000"
        [class.border-red-500]="
          cadastroForm.get('telefone')?.invalid && cadastroForm.get('telefone')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
    </div>

    <div class="group">
      <label class="block text-xs uppercase tracking-widest mb-1 text-purple-300/70 font-semibold"
        >Senha</label
      >
      <input
        formControlName="senha"
        type="password"
        placeholder="••••••••"
        [class.border-red-500]="
          cadastroForm.get('senha')?.invalid && cadastroForm.get('senha')?.touched
        "
        class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all"
      />
      <p
        *ngIf="cadastroForm.get('senha')?.invalid && cadastroForm.get('senha')?.touched"
        class="text-red-400 text-xs mt-1"
      >
        A senha deve ter pelo menos 6 dígitos.
      </p>
    </div>

    <button
      type="submit"
      [disabled]="cadastroForm.invalid"
      class="w-full bg-purple-600 hover:bg-purple-500 disabled:bg-gray-700 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-95 mt-4"
    >
      Cadastro
    </button>
  </form>
</div>
