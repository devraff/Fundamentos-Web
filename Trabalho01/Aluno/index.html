<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/form/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="../js/validation.js" defer></script>
    <script src="../js/courses.js" defer></script>
    <title>FormAluno</title>
  </head>
  <body>
    <div class="container">
      <div class="form">
        <h1>Cadastro de Aluno <i class="fa-solid fa-graduation-cap"></i></h1>
        <form id="register-form" action="" method="get">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Nome</label>
              <input type="text" id="nome" name="nome" required />
            </div>

            <div class="form-group">
              <label for="cpf">CPF</label>
              <input type="text" 
              id="cpf" 
              name="cpf" 
              placeholder="000.000.000-00" 
              pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              title="Digite o CPF no formato 000.000.000-00"
              required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="birth">Data de Nascimento</label>
              <input
                type="date"
                id="birthdate"
                name="birth"
                max="2008-03-02"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="course-selector">Curso</label>
            <select name="degree" id="course-selector" required>
              <option value="" disabled selected hidden>
                -- Selecione o curso --
              </option>
            </select>
          </div>

          <button type="submit">Cadastrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
