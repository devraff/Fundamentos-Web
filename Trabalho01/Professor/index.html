<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/form/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="../js/errors.js" defer></script>
    <script src="../js/courses.js" defer></script>
    <title>FormProfessor</title>
  </head>
  <body>
    <div class="container">
      <div class="form">
        <h1>
          Cadastro de Professor
          <i class="fa-sharp-duotone fa-solid fa-chalkboard-user"></i>
        </h1>
        <form action="" method="get">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Nome</label>
              <input type="text" id="nome" name="nome" required />
            </div>
            <div class="form-group">
              <label for="cpf">CPF</label>
              <input type="text" 
              id="cpf" 
              name="cpf" 
              placeholder="000.000.000-00" 
              pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              title="Digite o CPF no formato 000.000.000-00"
              required />
            </div>
          </div>
           <div class="form-row">
            <div class="form-group">
              <label for="birth">Data de Nascimento</label>
              <input
                type="date"
                id="birthdate"
                name="birth"
                max="2008-03-02"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required />
            </div>
          </div>

          <select name="degree" id="degree-selector" required>
            <option value="">-- Selecione sua formação --</option>
            <option value="tecnologo">Tecnólogo</option>
            <option value="bacharelado">Bacharelado</option>
            <option value="licenciatura">Licenciatura</option>
          </select>

          
          <select name="degree" id="course-selector" required>
            <option value="" disabled selected hidden>
              -- Selecione o curso --
            </option>
          </select>


          <button type="submit">Cadastrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
